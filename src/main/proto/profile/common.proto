syntax = "proto3";

package common;

import "google/protobuf/timestamp.proto";

option java_package = "com.rehaflow.profile_service.grpc";
option java_multiple_files = true;

enum AccountType {
  DOCTOR = 0;
  PATIENT = 1;
  HOSPITAL = 2;
}

message DoctorProfileDto {
  string full_name = 1;
  string direction = 2;
  string country = 3;
  string city = 4;
  google.protobuf.Timestamp birthday = 5;
  string hospital_name = 6;
  string hospital_id = 7;
}

message PatientProfileDto {
  string full_name = 1;
  int32 height = 2;
  double weight = 3;
  string gender = 4;
  bool after_operation = 5;
  bool after_trauma = 6;
  bool limited_movement = 7;
  google.protobuf.Timestamp birthday = 8;
  string hospital_id = 9;
}

message HospitalProfileDto {
  string country = 1;
  string city = 2;
  string address = 3;
  string main_doctor_full_name = 4;
  string hospital_type = 5;
  string hospital_name = 6;
}